name: Force Deploy Dynamic QR Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest site files
        uses: actions/checkout@v4
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload site from repository root
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy latest SnapQR Dynamic UI
        id: deployment
        uses: actions/deploy-pages@v4
